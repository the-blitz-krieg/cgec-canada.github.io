<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.seo_title | default: page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.meta_description | default: site.description }}">
  <meta name="keywords" content="{{ page.keywords }}">
  
  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.seo_title | default: page.title }}">
  <meta property="og:description" content="{{ page.meta_description | default: site.description }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:type" content="website">
  <meta property="og:image" content="{{ site.url }}/images/cgec-og-image.jpg">

  <!-- Canonical -->
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">

  <!-- Geo Tags -->
  <meta name="geo.region" content="CA">
  <meta name="geo.placename" content="Canada">

  {% if page.noindex %}
  <meta name="robots" content="noindex, nofollow">
  {% else %}
  <meta name="robots" content="index, follow">
  {% endif %}

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  
  <!-- Page Styles injected from front matter -->
  <style>{{ page.styles }}</style>
</head>
<body>
  {{ content }}
</body>
</html>
